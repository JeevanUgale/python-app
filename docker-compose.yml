services:
  admin-service:
    image: jeevanugale/admin_service:test-9d8e00e91821c0c91d9563b7874561c073ecad5d
    container_name: admin
    ports:
      - "5003:5003"
    env_file:
      - .env

  user-service:
    image: jeevanugale/user_service:test-9d8e00e91821c0c91d9563b7874561c073ecad5d
    container_name: user
    ports:
      - "5002:5002"
    env_file:
      - .env

  auth-service:
    image: jeevanugale/auth_service:test-9d8e00e91821c0c91d9563b7874561c073ecad5d
    container_name: auth
    ports:
      - "5001:5001"
    env_file:
      - .env

  web-frontend:
    image: jeevanugale/web_frontend:test-9d8e00e91821c0c91d9563b7874561c073ecad5d
    container_name: web
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - admin
      - user
      - auth