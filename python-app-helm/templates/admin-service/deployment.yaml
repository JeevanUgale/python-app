apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.admin.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.admin.labels.app }}
    environment: {{ .Values.global.environment }}

spec:
  replicas: {{ .Values.services.admin.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.services.admin.labels.app }}
      environment: {{ .Values.global.environment }}

  template:
    metadata:
      labels:
        app: {{ .Values.services.admin.labels.app }}
        environment: {{ .Values.global.environment }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{ .Values.services.admin.port }}"

    spec:
      containers:
        - name: {{ .Values.services.admin.labels.app }}
          image: {{ .Values.services.admin.image.repository }}:{{ .Values.services.admin.image.tag }}
          imagePullPolicy: {{ .Values.services.admin.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.admin.port }}
          envFrom:
            - configMapRef:
                name: app-configs
            - secretRef:
                name: app-secrets

          livenessProbe:
            httpGet:
              path: {{ .Values.services.admin.livenessProbe.path }}
              port: {{ .Values.services.admin.port }}
            initialDelaySeconds: {{ .Values.services.admin.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.services.admin.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.services.admin.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.services.admin.livenessProbe.failureThreshold }}

          resources:
            requests:
              memory: {{ .Values.services.admin.resources.requests.memory }}
              cpu: {{ .Values.services.admin.resources.requests.cpu }}
            limits:
              memory: {{ .Values.services.admin.resources.limits.memory }}
              cpu: {{ .Values.services.admin.resources.limits.cpu }}