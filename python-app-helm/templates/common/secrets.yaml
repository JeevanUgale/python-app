apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.global.appName }}
    environment: {{ .Values.global.environment }}
type: Opaque
data:
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASS: {{ .Values.secrets.dbPassword | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secrets.rootPassword | quote }}

  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}

  ADMIN_USERNAME: {{ .Values.secrets.adminUsername | quote }}
  ADMIN_PASSWORD_HASH: {{ .Values.secrets.adminPasswordHash | quote }}
