apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.auth.labels.app }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.auth.labels.app }}
    environment: {{ .Values.global.environment }}
spec:
  selector:
    app: {{ .Values.services.auth.labels.app }}
    environment: {{ .Values.global.environment }}
  ports:
    - port: {{ .Values.services.auth.port }}
      targetPort: {{ .Values.services.auth.port }}
  type: ClusterIP
