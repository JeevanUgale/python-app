name: CI pipeline for python application

on:
  pull_request:
    branches:
      - bugfix-01
    paths-ignore:
      - 'docker-compose.yml'
      - 'k8s-manifest/admin-service/deployment.yml'
      - 'k8s-manifest/user-service/deployment.yml'
      - 'k8s-manifest/auth-service/deployment.yml'
      - 'k8s-manifest/web-frontend/deployment.yml'

permissions:
  contents: write
  pull-requests: write

jobs:

  AI-Review:

    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install openai

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/ai_review.py

      - name: Post PR comment
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });


  Docker-Build-Push:

    runs-on: self-hosted
    needs: AI-Review
    environment: development

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build web_frontend image
        run: |
          docker build -f services/web_frontend/Dockerfile \
          -t jeevanugale/web_frontend:test-${{ github.sha }} .

          docker push jeevanugale/web_frontend:test-${{ github.sha }}

      - name: Build auth_service image
        run: |
          docker build -f services/auth_service/Dockerfile \
          -t jeevanugale/auth_service:test-${{ github.sha }} .

          docker push jeevanugale/auth_service:test-${{ github.sha }}

      - name: Build user_service image
        run: |
          docker build -f services/user_service/Dockerfile \
          -t jeevanugale/user_service:test-${{ github.sha }} .

          docker push jeevanugale/user_service:test-${{ github.sha }}

      - name: Build admin_service image
        run: |
          docker build -f services/admin_service/Dockerfile \
          -t jeevanugale/admin_service:test-${{ github.sha }} .

          docker push jeevanugale/admin_service:test-${{ github.sha }}


  Trivy-Scan:

    runs-on: self-hosted
    needs: Docker-Build-Push

    steps:

      - name: Scan web image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          scan-ref: jeevanugale/web_frontend:test-${{ github.sha }}
          format: table
          exit-code: '0'
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-web.txt

      - name: Scan auth image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          scan-ref: jeevanugale/auth_service:test-${{ github.sha }}
          format: table
          exit-code: '0'
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-auth.txt

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-web.txt
            trivy-auth.txt


  Update-Compose-And-Commit:

    runs-on: self-hosted
    needs: Trivy-Scan

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifests
        run: |
          sed -i "s|test-.*|test-${{ github.sha }}|g" docker-compose.yml
          sed -i "s|test-.*|test-${{ github.sha }}|g" k8s-manifest/*/deployment.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "ci: update image tags [skip ci]" || echo "No changes"

      - name: Push changes
        run: |
          git remote set-url origin \
          https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git push origin HEAD:${{ github.ref_name }}