name: CI pipeline for python application

on:
  push:
    branches:
      - testing
    paths-ignore:
      - 'docker-compose.yml'
      - 'k8s-manifest/admin-service/deployment.yml'
      - 'k8s-manifest/user-service/deployment.yml'
      - 'k8s-manifest/auth-service/deployment.yml'
      - 'k8s-manifest/web-frontend/deployment.yml'

permissions:
  contents: write

jobs:
  
  Docker-Build-Push:

    runs-on: self-hosted
    environment: development

    steps:

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build web_frontend image
        run: |
          docker build -f services/web_frontend/Dockerfile \
          -t jeevanugale/web_frontend:test-${{ github.sha }} .

          docker push jeevanugale/web_frontend:test-${{ github.sha }}

      - name: Build auth_service image
        run: |
          docker build -f services/auth_service/Dockerfile \
          -t jeevanugale/auth_service:test-${{ github.sha }} .

          docker push jeevanugale/auth_service:test-${{ github.sha }}

      - name: Build user_service image
        run: |
          docker build -f services/user_service/Dockerfile \
          -t jeevanugale/user_service:test-${{ github.sha }} .

          docker push jeevanugale/user_service:test-${{ github.sha }}

      - name: Build admin_service image
        run: |
          docker build -f services/admin_service/Dockerfile \
          -t jeevanugale/admin_service:test-${{ github.sha }} .

          docker push jeevanugale/admin_service:test-${{ github.sha }}



  Trivy-Scan:

    runs-on: self-hosted
    needs: Docker-Build-Push

    steps:

      - name: Scan web image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          scan-ref: jeevanugale/web_frontend:test-${{ github.sha }}
          format: table
          exit-code: '0'
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-web.txt

      - name: Scan auth image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          scan-ref: jeevanugale/auth_service:test-${{ github.sha }}
          format: table
          exit-code: '0'
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-auth.txt

      - name: Scan user image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          scan-ref: jeevanugale/user_service:test-${{ github.sha }}
          format: table
          exit-code: '0'
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-user.txt

      - name: Scan admin image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          scan-ref: jeevanugale/admin_service:test-${{ github.sha }}
          format: table
          exit-code: '0'
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-admin.txt

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: trivy-reports
          path: |
            trivy-web.txt
            trivy-auth.txt
            trivy-user.txt
            trivy-admin.txt

            
  Trivy-AI-Review:

    runs-on: self-hosted
    needs: Trivy-Scan

    steps:

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download trivy reports
        uses: actions/download-artifact@v8
        with:
          name: trivy-reports

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Analyze reports with AI
        run: |
          python ai-scripts/ai_review.py

      - name: Upload AI review results
        uses: actions/upload-artifact@v7
        with:
          name: ai-trivy-review
          path: ai-trivy-review.txt

  Update-Compose-And-Commit:

    runs-on: self-hosted
    needs: Trivy-Scan

    steps:

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifests
        run: |
          sed -i "s|test-.*|test-${{ github.sha }}|g" docker-compose.yml
          sed -i "s|test-.*|test-${{ github.sha }}|g" k8s-manifest/*/deployment.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "ci: update image tags [skip ci]" || echo "No changes"

      - name: Push changes
        run: |
          git remote set-url origin \
          https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git push origin HEAD:${{ github.ref_name }}