apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sa-clusterrolebinding
  labels:
    app: monitoring
    environment: dev
subjects:
- kind: ServiceAccount
  name: prometheus-sa
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus-sa-role
  apiGroup: rbac.authorization.k8s.io