apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deploy
  namespace: python
  labels:
    app: web-frontend
    environment: dev
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "5000"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-frontend
      environment: dev
  template:
    metadata:
      labels:
        app: web-frontend
        environment: dev
    spec:
      containers:
        - name: web-frontend
          image: jeevanugale/web_frontend:test-bb0442ff61d1e1934453e0fe60d4f239fb7e9574
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-configs
            - secretRef:
                name: app-secrets

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"