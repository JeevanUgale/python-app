apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deploy
  namespace: python
  labels:
    app: user-service
    environment: dev
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "5002"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
      environment: dev
  template:
    metadata:
      labels:
        app: user-service
        environment: dev
    spec:
      containers:
        - name: user-service
          image: jeevanugale/user_service:test-34e968bf9d4832e320c8d8f7a3eb7b6a981dd826
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: app-configs
            - secretRef:
                name: app-secrets
          
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"