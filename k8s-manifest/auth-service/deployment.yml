apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deploy
  namespace: python
  labels:
    app: auth-service
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
      environment: dev
  template:
    metadata:
      labels:
        app: auth-service
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5001"
    spec:
      containers:
        - name: auth-service
          image: jeevanugale/auth_service:test-fb48e372ab7044c608a872e1ce013af18a1cb17f
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: app-configs
            - secretRef:
                name: app-secrets
            
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"