apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deploy
  namespace: python
  labels:
    app: auth-service
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
      environment: dev
  template:
    metadata:
      labels:
        app: auth-service
        environment: dev
    spec:
      containers:
        - name: auth-service
          image: jeevanugale/auth_service:test-cd3892ae53fb1e1aed06420791f6f4e5c56bc1d6
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: app-configs
            - secretRef:
                name: app-secrets
            
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"